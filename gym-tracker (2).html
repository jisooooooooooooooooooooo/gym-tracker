<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#070710"/>
  <title>💪 GYM TRACKER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:#070710;font-family:'Barlow Condensed',sans-serif;color:#e8e8f0;overscroll-behavior:none}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:#ff3d00;border-radius:2px}

    #app{display:flex;flex-direction:column;height:100vh;max-width:600px;margin:0 auto}

    /* Header */
    .header{padding:env(safe-area-inset-top) 18px 12px;padding-top:calc(env(safe-area-inset-top) + 18px);border-bottom:1px solid #111120;flex-shrink:0}
    .header-inner{display:flex;align-items:flex-end}
    .header-sub{font-size:10px;letter-spacing:3px;color:#ff3d00;font-weight:700;margin-bottom:2px}
    .header-title{font-size:28px;font-weight:900;line-height:1;letter-spacing:1px;text-shadow:0 0 30px rgba(255,61,0,.4)}
    .header-count{margin-left:auto;text-align:right}
    .header-count-label{font-size:9px;color:#444;letter-spacing:2px}
    .header-count-val{font-size:24px;font-weight:900;color:#ff3d00}
    .header-count-val span{font-size:13px;color:#333}

    /* Scrollable content */
    .content{flex:1;overflow-y:auto;padding:14px 18px;padding-bottom:80px;-webkit-overflow-scrolling:touch}

    /* Bottom Nav */
    .nav{position:fixed;bottom:0;left:0;right:0;background:#070710;border-top:1px solid #111120;display:flex;max-width:600px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
    .nav-tab{flex:1;padding:13px 0;background:transparent;border:none;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;border-top:2px solid transparent}
    .nav-tab.active{color:#ff3d00;border-top-color:#ff3d00}

    /* Cards */
    .card{background:linear-gradient(135deg,#10101c,#0b0b16);border:1px solid #1a1a2c;border-radius:14px}
    .stat-b{background:linear-gradient(135deg,#111120,#0b0b18);border:1px solid #1a1a2a;border-radius:12px;padding:14px;text-align:center}

    /* Buttons */
    .btn-p{background:#ff3d00;color:#fff;border:none;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;display:block}
    .btn-p:active{background:#ff5722;transform:scale(.98)}
    .btn-g{background:transparent;color:#555;border:1px solid #1c1c2c;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;padding:6px 12px}
    .btn-g:active{border-color:#444;color:#bbb}

    /* Day pills */
    .day-pill{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 9px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s;min-width:38px}
    .day-pill.today{border-color:#ff3d00;background:rgba(255,61,0,.07)}
    .dot{width:4px;height:4px;border-radius:50%;background:#ff3d00}

    /* Exercise card */
    .ex-card{padding:14px;animation:su .3s ease}
    .chip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;display:inline-block}

    /* Set row */
    .set-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #111120}
    .set-row:last-child{border-bottom:none}
    .done-c{width:28px;height:28px;border-radius:50%;border:2px solid #222234;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:12px;background:transparent}
    .done-c.done{background:#ff3d00;border-color:#ff3d00;color:#fff}
    .si{background:#090914;border:1px solid #181826;color:#e8e8f0;border-radius:8px;font-family:'Barlow',sans-serif;font-size:16px;text-align:center;outline:none;transition:border-color .15s;padding:8px 2px;-moz-appearance:textfield;flex:1}
    .si::-webkit-outer-spin-button,.si::-webkit-inner-spin-button{-webkit-appearance:none}
    .si:focus{border-color:#ff3d00}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fi .15s ease}
    .modal-box{background:#0b0b16;border:1px solid #252538;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:94vh;overflow-y:auto;animation:su .22s ease;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom)}
    .ex-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;border:1px solid #161624;transition:all .15s;background:transparent;margin-bottom:6px}
    .ex-row:active{background:#111120}
    .ex-row.sel{background:rgba(255,61,0,.05);border-color:#ff3d00}
    .fchip{padding:5px 12px;border-radius:20px;border:1px solid #1a1a2a;background:transparent;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap}
    .fchip.active{border-color:#ff3d00;color:#ff3d00;background:rgba(255,61,0,.07)}
    .info-box{background:#070712;border:1px solid #181828;border-radius:12px;padding:16px;margin-top:10px;animation:su .2s ease}
    .shimmer{animation:pulse 1.4s infinite;background:#161624;border-radius:5px;display:block}

    /* Bar chart */
    .bar{border-radius:4px 4px 0 0;cursor:pointer;transition:height .5s cubic-bezier(.34,1.56,.64,1);width:100%}

    /* Animations */
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes su{from{transform:translateY(36px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}

    /* Misc */
    input[type=text]{background:#090914;border:1px solid #252538;color:#e8e8f0;border-radius:8px;padding:10px 12px;font-family:'Barlow',sans-serif;font-size:15px;outline:none;width:100%}
    input[type=text]:focus{border-color:#ff3d00}
    .days-scroll{display:flex;gap:4px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
    .days-scroll::-webkit-scrollbar{display:none}
    .filter-scroll{display:flex;gap:5px;overflow-x:auto;padding:0 18px 12px;scrollbar-width:none}
    .filter-scroll::-webkit-scrollbar{display:none}
    .ex-list{padding:0 18px;max-height:32vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
    .col-flex{display:flex;flex-direction:column;gap:11px}
    .row-flex{display:flex;align-items:center;gap:8px}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div>
        <div class="header-sub">💪 GYM TRACKER</div>
        <div class="header-title" id="headerTitle">오늘의 운동</div>
      </div>
      <div class="header-count" id="headerCount" style="display:none">
        <div class="header-count-label">완료</div>
        <div class="header-count-val" id="headerCountVal"></div>
      </div>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="nav">
    <button class="nav-tab active" id="tabToday" onclick="setView('today')">🏋️ 오늘</button>
    <button class="nav-tab" id="tabAnalysis" onclick="setView('analysis')">📊 분석</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="padding:18px 18px 0">
      <div style="display:flex;align-items:center;margin-bottom:14px">
        <div style="font-size:19px;font-weight:800">운동 선택</div>
        <button onclick="closeAddModal()" style="margin-left:auto;background:none;border:none;color:#444;font-size:22px;cursor:pointer">×</button>
      </div>
      <div style="display:flex;gap:7px;margin-bottom:14px">
        <button id="modeList" onclick="setMode(false)" style="flex:1;padding:8px;border-radius:8px;border:1px solid #ff3d00;background:rgba(255,61,0,.07);color:#ff3d00;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px">목록에서 선택</button>
        <button id="modeCustom" onclick="setMode(true)" style="flex:1;padding:8px;border-radius:8px;border:1px solid #1a1a2a;background:transparent;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px">직접 입력</button>
      </div>
    </div>
    <div id="modalList">
      <div class="filter-scroll" id="muscleFilters"></div>
      <div class="ex-list" id="exList"></div>
      <div style="padding:0 18px">
        <div class="info-box" id="infoBox">
          <div style="font-size:10px;color:#ff3d00;letter-spacing:2px">운동을 선택하면 AI 설명이 나타납니다</div>
        </div>
      </div>
    </div>
    <div id="modalCustom" style="display:none;padding:0 18px">
      <input type="text" id="customInput" placeholder="운동 이름 직접 입력 (예: 케이블 크런치)" onkeydown="if(event.key==='Enter')addExercise()"/>
    </div>
    <div style="display:flex;gap:9px;padding:14px 18px 28px">
      <button class="btn-g" onclick="closeAddModal()" style="flex:1;padding:12px">취소</button>
      <button class="btn-p" onclick="addExercise()" style="flex:2;padding:12px">추가하기</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const EXERCISES = [
  {name:"벤치프레스",muscle:"가슴"},{name:"인클라인벤치",muscle:"가슴"},
  {name:"체스트플라이",muscle:"가슴"},{name:"딥스",muscle:"가슴"},
  {name:"스쿼트",muscle:"하체"},{name:"레그프레스",muscle:"하체"},
  {name:"레그컬",muscle:"하체"},{name:"레그익스텐션",muscle:"하체"},
  {name:"힙쓰러스트",muscle:"하체"},
  {name:"데드리프트",muscle:"등"},{name:"바벨로우",muscle:"등"},
  {name:"랫풀다운",muscle:"등"},{name:"케이블로우",muscle:"등"},
  {name:"시티드로우",muscle:"등"},{name:"풀업",muscle:"등"},
  {name:"오버헤드프레스",muscle:"어깨"},{name:"숄더레이즈",muscle:"어깨"},
  {name:"페이스풀",muscle:"어깨"},
  {name:"덤벨컬",muscle:"이두"},
  {name:"트라이셉스푸시다운",muscle:"삼두"},
];

const MC = {
  "가슴": {bg:"#ff3d0018",border:"#ff3d0055",text:"#ff6e40"},
  "하체": {bg:"#ff910018",border:"#ff910055",text:"#ffb74d"},
  "등":   {bg:"#00e5ff18",border:"#00e5ff55",text:"#4dd0e1"},
  "어깨": {bg:"#ffea0018",border:"#ffea0055",text:"#fff176"},
  "이두": {bg:"#d500f918",border:"#d500f955",text:"#ea80fc"},
  "삼두": {bg:"#76ff0318",border:"#76ff0355",text:"#b9f6ca"},
};
const getMC = m => MC[m] || {bg:"#ffffff10",border:"#ffffff25",text:"#aaa"};
const DAYS = ["월","화","수","목","금","토","일"];
const MUSCLES = ["전체",...[...new Set(EXERCISES.map(e=>e.muscle))]];

const STORAGE_KEY = "gym_tracker_v3";
const INFO_CACHE_KEY = "gym_info_cache_v1";
const loadData = () => { try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return{};} };
const saveData = d => localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
const loadCache = () => { try{return JSON.parse(localStorage.getItem(INFO_CACHE_KEY))||{};}catch{return{};} };
const saveCache = c => localStorage.setItem(INFO_CACHE_KEY, JSON.stringify(c));

// ── STATE ──
let appData = loadData();
let currentView = "today";
let selectedDate = getTodayKey();
let muscleFilter = "전체";
let selectedEx = EXERCISES[0];
let useCustom = false;
let infoLoading = false;

// ── DATE UTILS ──
function toLocalKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function getTodayKey() { return toLocalKey(new Date()); }
function getWeekKey() {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate()-((d.getDay()+6)%7));
  return toLocalKey(d);
}
function getWeekDates() {
  const wk = getWeekKey();
  const s = new Date(wk+'T00:00:00');
  return Array.from({length:7},(_,i)=>{ const d=new Date(s); d.setDate(s.getDate()+i); return toLocalKey(d); });
}

// ── AI INFO ──
async function fetchExerciseInfo(ex) {
  const cache = loadCache();
  if (cache[ex.name]) return cache[ex.name];

  // Check if API key is set
  const apiKey = localStorage.getItem('anthropic_api_key') || '';
  if (!apiKey) {
    return { name:ex.name, muscle:ex.muscle, description:"API 키가 설정되지 않았습니다. 설정 버튼을 눌러 Anthropic API 키를 입력해주세요.", how_to:"", tips:"", equipment:"" };
  }

  const prompt = `You are a fitness expert. For the gym exercise "${ex.name}" (muscle group: ${ex.muscle}), respond ONLY with a valid JSON object — no markdown, no backticks:
{"description":"운동 효과 설명 2문장 (한국어)","how_to":"핵심 자세 포인트 3가지, 번호 매겨서 (한국어, 각 항목 한 줄)","tips":"초보자가 가장 많이 하는 실수 1가지 (한국어, 1문장)","equipment":"필요한 기구 이름 (한국어, 짧게)"}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim();
    const info = JSON.parse(text);
    const result = {...info, name:ex.name, muscle:ex.muscle};
    cache[ex.name] = result;
    saveCache(cache);
    return result;
  } catch(e) {
    return { name:ex.name, muscle:ex.muscle, description:"정보를 불러오지 못했습니다: "+e.message, how_to:"", tips:"", equipment:"" };
  }
}

// ── RENDER ──
function render() {
  const weekDates = getWeekDates();
  const todayData = appData[selectedDate] || {exercises:[]};
  const doneSets = todayData.exercises.reduce((s,ex)=>s+ex.sets.filter(st=>st.done).length,0);
  const totalSets = todayData.exercises.reduce((s,ex)=>s+ex.sets.length,0);

  // Header
  document.getElementById('headerTitle').textContent = currentView==='today' ? '오늘의 운동' : '주간 분석';
  const hc = document.getElementById('headerCount');
  const hcv = document.getElementById('headerCountVal');
  if (currentView==='today' && totalSets>0) {
    hc.style.display='block';
    hcv.innerHTML = `${doneSets}<span>/${totalSets}</span>`;
  } else { hc.style.display='none'; }

  // Nav
  document.getElementById('tabToday').className = 'nav-tab'+(currentView==='today'?' active':'');
  document.getElementById('tabAnalysis').className = 'nav-tab'+(currentView==='analysis'?' active':'');

  const content = document.getElementById('content');
  if (currentView==='today') renderToday(content, weekDates, todayData);
  else renderAnalysis(content, weekDates);
}

function renderToday(el, weekDates, todayData) {
  // Day pills
  const daysHtml = weekDates.map((d,i)=>`
    <div class="day-pill${d===selectedDate?' today':''}" onclick="selectDate('${d}')">
      <span style="font-size:9px;color:#444;letter-spacing:1px">${DAYS[i]}</span>
      <span style="font-size:16px;font-weight:${d===selectedDate?900:500};color:${d===selectedDate?'#ff3d00':'#666'}">${new Date(d).getDate()}</span>
      ${appData[d]?.exercises?.length>0?'<div class="dot"></div>':'<div style="height:4px"></div>'}
    </div>
  `).join('');

  // Exercises
  let exHtml = '';
  if (todayData.exercises.length===0) {
    exHtml = `<div style="text-align:center;padding:52px 0">
      <div style="font-size:44px;margin-bottom:12px">🏋️</div>
      <div style="font-size:18px;font-weight:700;color:#222234;letter-spacing:1px">운동을 추가해보세요</div>
      <div style="font-size:12px;margin-top:6px;color:#141424">운동 부위별로 정리된 목록에서 선택하세요</div>
    </div>`;
  } else {
    exHtml = '<div class="col-flex">' + todayData.exercises.map((ex,ei)=>{
      const dc = ex.sets.filter(s=>s.done).length;
      const vol = ex.sets.reduce((s,st)=>s+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0);
      const exD = EXERCISES.find(e=>e.name===ex.name);
      const mc = getMC(exD?.muscle);
      const setsHtml = ex.sets.map((st,si)=>`
        <div class="set-row" style="opacity:${st.done?.45:1}">
          <button class="done-c${st.done?' done':''}" onclick="toggleDone(${ei},${si})" style="border-color:${st.done?'#ff3d00':mc.border}">${st.done?'✓':''}</button>
          <div style="width:32px;text-align:center;font-size:12px;color:#2a2a3e;font-weight:700">${si+1}</div>
          <input type="number" class="si" value="${st.weight||''}" oninput="updateField(${ei},${si},'weight',this.value)" placeholder="—"/>
          <input type="number" class="si" value="${st.reps||''}" oninput="updateField(${ei},${si},'reps',this.value)" placeholder="—"/>
          <button onclick="removeSet(${ei},${si})" style="background:none;border:none;color:#222234;cursor:pointer;font-size:17px;width:22px;padding:0;flex-shrink:0">×</button>
        </div>
      `).join('');
      return `
        <div class="card ex-card">
          <div style="display:flex;align-items:center;margin-bottom:12px">
            <div style="flex:1">
              <div style="font-size:19px;font-weight:800">${ex.name}</div>
              <div style="display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap">
                ${exD?`<span class="chip" style="background:${mc.bg};color:${mc.text};border:1px solid ${mc.border}">${exD.muscle}</span>`:''}
                <span style="font-size:11px;color:#383850">${dc}/${ex.sets.length}세트${vol>0?' · '+vol.toLocaleString()+'lbs ('+Math.round(vol*0.453592).toLocaleString()+'kg)':''}</span>
              </div>
            </div>
            <button class="btn-g" onclick="removeEx(${ei})" style="padding:3px 9px;font-size:11px;color:#c62828;border:1px solid #1e1212">삭제</button>
          </div>
          <div style="display:flex;gap:8px;padding-bottom:6px;border-bottom:1px solid #111120;margin-bottom:2px">
            <div style="width:28px"></div>
            <div style="width:32px;font-size:9px;color:#333;letter-spacing:1px;text-align:center">세트</div>
            <div style="flex:1;font-size:9px;color:#333;letter-spacing:1px;text-align:center">중량(lbs)</div>
            <div style="flex:1;font-size:9px;color:#333;letter-spacing:1px;text-align:center">횟수</div>
            <div style="width:22px"></div>
          </div>
          ${setsHtml}
          <button onclick="addSet(${ei})" style="margin-top:10px;width:100%;padding:7px;background:rgba(255,61,0,.04);border:1px dashed rgba(255,61,0,.2);border-radius:8px;color:#ff3d00;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif">+ 세트 추가</button>
        </div>`;
    }).join('') + '</div>';
  }

  el.innerHTML = `
    <div class="days-scroll">${daysHtml}</div>
    ${exHtml}
    <button class="btn-p" onclick="openAddModal()" style="width:100%;padding:14px;margin-top:12px;font-size:15px;border-radius:12px">+ 운동 추가</button>
    <button onclick="openSettings()" style="margin-top:10px;width:100%;padding:8px;background:transparent;border:1px solid #1a1a2a;border-radius:8px;color:#444;font-size:11px;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:1px">⚙️ API 키 설정</button>
  `;
}

function renderAnalysis(el, weekDates) {
  const weekVol = weekDates.map(d=>(appData[d]?.exercises||[]).reduce((s,ex)=>s+ex.sets.reduce((s2,st)=>s2+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0),0));
  const maxVol = Math.max(...weekVol,1);
  const weekStats = {};
  weekDates.forEach(d=>{
    (appData[d]?.exercises||[]).forEach(ex=>{
      if(!weekStats[ex.name]) weekStats[ex.name]={vol:0,sets:0,days:new Set(),muscle:""};
      ex.sets.forEach(s=>{weekStats[ex.name].vol+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);weekStats[ex.name].sets++;});
      weekStats[ex.name].days.add(d);
      const exD=EXERCISES.find(e=>e.name===ex.name);
      if(exD) weekStats[ex.name].muscle=exD.muscle;
    });
  });
  const topEx = Object.entries(weekStats).sort((a,b)=>b[1].vol-a[1].vol).slice(0,5);
  const totalWkVol = weekVol.reduce((a,b)=>a+b,0);
  const activeDays = weekDates.filter(d=>appData[d]?.exercises?.length>0).length;

  // Stats
  const statsHtml = `<div class="grid3">
    <div class="stat-b"><div style="font-size:22px;font-weight:900;color:#ff3d00">${activeDays}일</div><div style="font-size:10px;color:#444;letter-spacing:1px;margin-top:2px">운동일</div></div>
    <div class="stat-b"><div style="font-size:17px;font-weight:900;color:#ff3d00">${totalWkVol.toLocaleString()}<span style="font-size:10px">lbs</span></div><div style="font-size:11px;color:#555;margin-top:2px">${Math.round(totalWkVol*0.453592).toLocaleString()}<span style="font-size:9px;color:#444"> kg</span></div><div style="font-size:10px;color:#444;letter-spacing:1px;margin-top:2px">주간볼륨</div></div>
    <div class="stat-b"><div style="font-size:22px;font-weight:900;color:#ff3d00">${Object.keys(weekStats).length}가지</div><div style="font-size:10px;color:#444;letter-spacing:1px;margin-top:2px">종류</div></div>
  </div>`;

  // Bar chart
  const barsHtml = weekVol.map((v,i)=>`
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
      <div style="font-size:8px;color:${v>0?'#ff3d00':'#222'};min-height:10px">${v>0?v.toLocaleString()+'lbs · '+Math.round(v*0.453592).toLocaleString()+'kg':''}</div>
      <div style="width:100%;display:flex;align-items:flex-end;height:66px">
        <div class="bar" style="min-height:${v>0?4:0}px;height:${(v/maxVol)*100}%;background:${weekDates[i]===selectedDate?'linear-gradient(to top,#ff3d00,#ff7043)':v>0?'linear-gradient(to top,#1e1e38,#2e2e50)':'#0e0e1a'}" onclick="selectDate('${weekDates[i]}');setView('today')"></div>
      </div>
      <div style="font-size:11px;color:${weekDates[i]===getTodayKey()?'#ff3d00':'#2a2a3e'};font-weight:700">${DAYS[i]}</div>
    </div>
  `).join('');

  // Top exercises
  const topHtml = topEx.length===0 ? '' : `<div class="card" style="padding:18px;margin-bottom:12px">
    <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#444;margin-bottom:12px">주간 운동 순위</div>
    ${topEx.map(([name,stat],i)=>{
      const mc=getMC(stat.muscle);
      return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:${i<topEx.length-1?'1px solid #111120':'none'}">
        <div style="font-size:18px;font-weight:900;color:${i===0?'#ff3d00':'#222234'};width:20px">${i+1}</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700">${name}</div>
          <div style="display:flex;gap:6px;margin-top:2px;align-items:center">
            ${stat.muscle?`<span class="chip" style="background:${mc.bg};color:${mc.text};border:1px solid ${mc.border}">${stat.muscle}</span>`:''}
            <span style="font-size:10px;color:#333">${stat.sets}세트 · ${stat.days.size}일</span>
          </div>
        </div>
        <div style="font-size:15px;font-weight:900;color:${mc.text}">${stat.vol.toLocaleString()}lbs<div style='font-size:10px;color:#555;text-align:right;margin-top:1px'>${Math.round(stat.vol*0.453592).toLocaleString()}kg</div></div>
      </div>`;
    }).join('')}
  </div>`;

  // Daily breakdown
  const dailyHtml = weekDates.map((d,i)=>{
    const day = appData[d];
    if (!day?.exercises?.length) return `<div style="display:flex;gap:12px;padding:8px 0;border-bottom:${i<6?'1px solid #111120':'none'};opacity:.3"><div style="font-size:12px;font-weight:700;width:16px;color:#444">${DAYS[i]}</div><div style="font-size:11px;color:#222">휴식일</div></div>`;
    const vol=day.exercises.reduce((s,ex)=>s+ex.sets.reduce((s2,st)=>s2+(parseFloat(st.weight)||0)*(parseInt(st.reps)||0),0),0);
    return `<div style="padding:8px 0;border-bottom:${i<6?'1px solid #111120':'none'}">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:12px;font-weight:800;width:16px;color:${d===getTodayKey()?'#ff3d00':'#666'}">${DAYS[i]}</div>
        <div style="flex:1;font-size:11px;color:#555">${day.exercises.map(e=>e.name).join(' · ')}</div>
        <div style="font-size:12px;font-weight:700;color:#ff3d00">${vol.toLocaleString()}lbs <span style='font-size:10px;color:#555'>${Math.round(vol*0.453592).toLocaleString()}kg</span></div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    ${statsHtml}
    <div class="card" style="padding:18px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#444;margin-bottom:16px">일별 볼륨</div>
      <div style="display:flex;align-items:flex-end;gap:5px;height:100px">${barsHtml}</div>
    </div>
    ${topHtml}
    <div class="card" style="padding:18px">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:#444;margin-bottom:12px">일별 목록</div>
      ${dailyHtml}
    </div>
  `;
}

// ── ACTIONS ──
function setView(v) { currentView=v; render(); window.scrollTo(0,0); }
function selectDate(d) { selectedDate=d; render(); }

function addSet(ei) {
  const td = appData[selectedDate]||{exercises:[]};
  const ex = td.exercises[ei];
  const last = ex.sets[ex.sets.length-1];
  ex.sets.push({weight:last?.weight||'',reps:last?.reps||'',done:false});
  saveData(appData); render();
}
function removeSet(ei,si) {
  const td = appData[selectedDate]||{exercises:[]};
  const ex = td.exercises[ei];
  if(ex.sets.length===1){ removeEx(ei); return; }
  ex.sets.splice(si,1);
  saveData(appData); render();
}
function toggleDone(ei,si) {
  const td = appData[selectedDate]||{exercises:[]};
  const st = td.exercises[ei].sets[si];
  st.done = !st.done;
  saveData(appData); render();
}
function updateField(ei,si,f,v) {
  if(!appData[selectedDate]) appData[selectedDate]={exercises:[]};
  appData[selectedDate].exercises[ei].sets[si][f]=v;
  saveData(appData);
  // Update header count only
  const td=appData[selectedDate];
  const doneSets=td.exercises.reduce((s,ex)=>s+ex.sets.filter(st=>st.done).length,0);
  const totalSets=td.exercises.reduce((s,ex)=>s+ex.sets.length,0);
  if(totalSets>0){document.getElementById('headerCount').style.display='block';document.getElementById('headerCountVal').innerHTML=`${doneSets}<span>/${totalSets}</span>`;}
}
function removeEx(ei) {
  const td = appData[selectedDate]||{exercises:[]};
  td.exercises.splice(ei,1);
  saveData(appData); render();
}

// ── MODAL ──
function openAddModal() {
  document.getElementById('modal').style.display='flex';
  setMode(false);
  renderMuscleFilters();
  renderExList();
  selectModalEx(EXERCISES[0]);
}
function closeAddModal() { document.getElementById('modal').style.display='none'; }
function closeModal(e) { if(e.target===document.getElementById('modal')) closeAddModal(); }

function setMode(custom) {
  useCustom=custom;
  document.getElementById('modalList').style.display=custom?'none':'block';
  document.getElementById('modalCustom').style.display=custom?'block':'none';
  document.getElementById('modeList').style.cssText=`flex:1;padding:8px;border-radius:8px;border:1px solid ${!custom?'#ff3d00':'#1a1a2a'};background:${!custom?'rgba(255,61,0,.07)':'transparent'};color:${!custom?'#ff3d00':'#444'};font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px`;
  document.getElementById('modeCustom').style.cssText=`flex:1;padding:8px;border-radius:8px;border:1px solid ${custom?'#ff3d00':'#1a1a2a'};background:${custom?'rgba(255,61,0,.07)':'transparent'};color:${custom?'#ff3d00':'#444'};font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px`;
  if(custom) setTimeout(()=>document.getElementById('customInput')?.focus(),100);
}

function renderMuscleFilters() {
  document.getElementById('muscleFilters').innerHTML = MUSCLES.map(m=>
    `<button class="fchip${muscleFilter===m?' active':''}" onclick="setMuscleFilter('${m}')">${m}</button>`
  ).join('');
}

function setMuscleFilter(m) {
  muscleFilter=m; renderMuscleFilters(); renderExList();
}

function renderExList() {
  const filtered = muscleFilter==='전체' ? EXERCISES : EXERCISES.filter(e=>e.muscle===muscleFilter);
  document.getElementById('exList').innerHTML = filtered.map(ex=>{
    const mc=getMC(ex.muscle);
    const isSel=selectedEx?.name===ex.name;
    return `<div class="ex-row${isSel?' sel':''}" onclick="selectModalEx(${JSON.stringify(ex).replace(/"/g,'&quot;')})">
      <div style="flex:1"><span style="font-size:15px;font-weight:700">${ex.name}</span></div>
      <span class="chip" style="background:${mc.bg};color:${mc.text};border:1px solid ${mc.border}">${ex.muscle}</span>
      ${isSel?'<span style="color:#ff3d00;font-size:15px;margin-left:4px">✓</span>':''}
    </div>`;
  }).join('');
}

async function selectModalEx(ex) {
  if(typeof ex === 'string') ex = JSON.parse(ex);
  selectedEx=ex;
  renderExList();
  const ib = document.getElementById('infoBox');
  ib.innerHTML=`<div style="font-size:10px;color:#ff3d00;letter-spacing:2px;margin-bottom:10px">AI 운동 정보 로딩 중...</div>
    ${[100,72,55].map(w=>`<div class="shimmer" style="height:10px;width:${w}%;margin-bottom:8px"></div>`).join('')}`;
  const info = await fetchExerciseInfo(ex);
  ib.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="font-size:15px;font-weight:800">${info.name}</div>
      ${info.equipment?`<span style="font-size:10px;color:#ff3d00;background:rgba(255,61,0,.08);border:1px solid rgba(255,61,0,.2);border-radius:6px;padding:2px 7px">🔧 ${info.equipment}</span>`:''}
    </div>
    <p style="font-size:12px;color:#888;line-height:1.6;margin-bottom:10px">${info.description||''}</p>
    ${info.how_to?`<div style="margin-bottom:10px"><div style="font-size:9px;color:#ff3d00;letter-spacing:2px;font-weight:700;margin-bottom:6px">자세 포인트</div><div style="font-size:12px;color:#bbb;line-height:1.8;white-space:pre-line">${info.how_to}</div></div>`:''}
    ${info.tips?`<div style="background:rgba(255,61,0,.05);border:1px solid rgba(255,61,0,.1);border-radius:8px;padding:8px 10px"><div style="font-size:9px;color:#ff3d00;letter-spacing:2px;font-weight:700;margin-bottom:3px">⚠️ 흔한 실수</div><div style="font-size:11px;color:#888">${info.tips}</div></div>`:''}
  `;
}

function addExercise() {
  const name = useCustom ? document.getElementById('customInput').value.trim() : selectedEx?.name;
  if(!name) return;
  if(!appData[selectedDate]) appData[selectedDate]={exercises:[]};
  appData[selectedDate].exercises.push({name, sets:[{weight:'',reps:'',done:false}]});
  saveData(appData);
  closeAddModal();
  render();
}

// ── SETTINGS ──
function openSettings() {
  const current = localStorage.getItem('anthropic_api_key')||'';
  const key = prompt('Anthropic API 키를 입력하세요:\n(https://console.anthropic.com 에서 발급)\n\n현재:'+(current?'설정됨 (sk-ant-***)':'없음'), current);
  if(key !== null) {
    localStorage.setItem('anthropic_api_key', key.trim());
    alert(key.trim() ? '✅ API 키가 저장되었습니다!' : '🗑️ API 키가 삭제되었습니다.');
  }
}

// ── INIT ──
render();
</script>
